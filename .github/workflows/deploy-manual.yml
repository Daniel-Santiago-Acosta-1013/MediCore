name: Manual Deploy / Infra Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Infra action: plan previews, apply deploys everything, destroy removes project infra but keeps the remote state bucket.'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: 'Required only for destroy. Type DESTROY to remove all project infrastructure.'
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VERSION: '1.5.7'
  TG_VERSION: '0.98.0'
  TG_DIR: 'infrastructure/terraform/live/prod'

concurrency:
  group: medicore-infra-management
  cancel-in-progress: false

jobs:
  manage-infrastructure:
    name: ${{ github.event.inputs.action }} all infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Confirm destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: To destroy all project infrastructure, set confirm_destroy to DESTROY."
            exit 1
          fi

      - name: Explain scope
        run: |
          echo "This workflow manages every Terragrunt module under ${{ env.TG_DIR }}."
          echo "The Terraform remote state S3 bucket is configured as an external backend and is not part of this destroy scope."

      - name: Terragrunt plan all
        if: ${{ github.event.inputs.action == 'plan' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt run-all plan --terragrunt-non-interactive

      - name: Terragrunt apply all
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt run-all apply --terragrunt-non-interactive -auto-approve

      - name: Terragrunt destroy all
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt run-all destroy --terragrunt-non-interactive -auto-approve

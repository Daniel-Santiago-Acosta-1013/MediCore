name: Manual Deploy / Infra Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Infra action: plan previews, apply deploys everything, destroy removes project infra but keeps the remote state bucket.'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: 'Required only for destroy. Type DESTROY to remove all project infrastructure.'
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VERSION: '1.5.7'
  TG_VERSION: '0.98.0'
  TG_DIR: 'infrastructure/terraform/live/prod'
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: 'medicore-terraform-locks'

concurrency:
  group: medicore-infra-management
  cancel-in-progress: false

jobs:
  manage-infrastructure:
    name: ${{ github.event.inputs.action }} all infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Bootstrap Terraform backend
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          state_bucket="${TF_STATE_BUCKET:-medicore-terraform-state-${account_id}}"
          lock_table="${TF_LOCK_TABLE}"

          echo "Using Terraform state bucket: ${state_bucket}"
          echo "Using Terraform lock table: ${lock_table}"

          if ! aws s3api head-bucket --bucket "$state_bucket" >/dev/null 2>&1; then
            echo "Creating Terraform state bucket ${state_bucket}..."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$state_bucket" --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "$state_bucket" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$state_bucket" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$state_bucket" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$state_bucket" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "Terraform state bucket already exists."
          fi

          if ! aws dynamodb describe-table --table-name "$lock_table" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "Creating Terraform lock table ${lock_table}..."
            aws dynamodb create-table \
              --table-name "$lock_table" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${AWS_REGION}"

            aws dynamodb wait table-exists --table-name "$lock_table" --region "${AWS_REGION}"
          else
            echo "Terraform lock table already exists."
          fi

      - name: Confirm destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: To destroy all project infrastructure, set confirm_destroy to DESTROY."
            exit 1
          fi

      - name: Explain scope
        run: |
          echo "This workflow manages every Terragrunt module under ${{ env.TG_DIR }}."
          echo "The Terraform remote state S3 bucket is configured as an external backend and is not part of this destroy scope."

      - name: Terragrunt plan all
        if: ${{ github.event.inputs.action == 'plan' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt --non-interactive run --all -- plan

      - name: Terragrunt apply all
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt --non-interactive run --all -- apply -auto-approve

      - name: Terragrunt destroy all
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          cd ${{ env.TG_DIR }}
          terragrunt --non-interactive run --all -- destroy -auto-approve

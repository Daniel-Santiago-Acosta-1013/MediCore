name: Deploy API to AWS

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'infrastructure/k8s/base/api-gateway/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy. Leave empty to use the selected commit SHA.'
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  build-and-deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        working-directory: apps/api
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          docker build -t ${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG .
          docker push ${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Setup Kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin
          kustomize version

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy API to EKS
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          cd infrastructure/k8s/overlays/aws
          kustomize edit set image medicore-api=${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/aws-api-gateway-prod -n medicore-env-dev --timeout=300s

name: Deploy API to AWS

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy. Leave empty to use the selected commit SHA.'
        required: false
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  TF_VERSION: '1.5.7'
  TG_VERSION: '0.98.0'
  TG_RDS_DIR: 'infrastructure/terraform/live/prod/rds'

jobs:
  build-and-deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        working-directory: apps/api
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          docker build -t ${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG .
          docker push ${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup Kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin
          kustomize version

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Sync Aurora database secret
        run: |
          cd ${{ env.TG_RDS_DIR }}
          DB_HOST="$(terragrunt output -raw endpoint)"
          DB_PORT="$(terragrunt output -raw port)"
          DB_NAME="$(terragrunt output -raw db_name)"
          DB_USER="$(terragrunt output -raw username)"
          DB_PASSWORD="$(terragrunt output -raw password)"
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

          kubectl create namespace medicore-env-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic api-db-secret \
            --namespace medicore-env-dev \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=POSTGRES_HOST="$DB_HOST" \
            --from-literal=POSTGRES_PORT="$DB_PORT" \
            --from-literal=POSTGRES_USER="$DB_USER" \
            --from-literal=POSTGRES_PASSWORD="$DB_PASSWORD" \
            --from-literal=POSTGRES_DB="$DB_NAME" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy API to EKS
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          cd infrastructure/k8s/overlays/aws
          kustomize edit set image medicore-api=${{ env.ECR_REGISTRY }}/medicore-api:$IMAGE_TAG
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/aws-api-gateway-prod -n medicore-env-dev --timeout=300s

version: "3"

vars:
  K8S_OVERLAY: infrastructure/k8s/overlays/local
  API_IMAGE: medicore-api
  FRONTEND_IMAGE: medicore-frontend
  DB_COMPOSE: docker-compose.db.yml
  DB_URL: db:pg://medicore:secret@host.docker.internal:5432/medicore
  SQITCH_IMAGE: sqitch/sqitch
  SQITCH_DIR: apps/api/db
  TRAEFIK_NAMESPACE: traefik
  TRAEFIK_RELEASE: traefik
  METRICS_NAMESPACE: kube-system
  METRICS_RELEASE: metrics-server

tasks:
  default:
    cmds:
      - task --list

  db:up:
    desc: Levantar PostgreSQL
    cmds:
      - docker compose -f {{.DB_COMPOSE}} up -d
      - |
        for attempt in $(seq 1 30); do
          if docker compose -f {{.DB_COMPOSE}} exec -T db pg_isready -U medicore -d medicore >/dev/null 2>&1; then
            docker compose -f {{.DB_COMPOSE}} exec -T db pg_isready -U medicore -d medicore
            exit 0
          fi
          sleep 1
        done
        docker compose -f {{.DB_COMPOSE}} logs db
        exit 1

  db:down:
    desc: Detener PostgreSQL (conserva datos)
    cmds:
      - docker compose -f {{.DB_COMPOSE}} down

  db:destroy:
    desc: Destruir PostgreSQL y borrar datos
    prompt: Esto elimina el volumen local de PostgreSQL. Continuar?
    cmds:
      - docker compose -f {{.DB_COMPOSE}} down -v

  db:shell:
    desc: Abrir psql
    cmds:
      - docker compose -f {{.DB_COMPOSE}} exec db psql -U medicore -d medicore

  db:migrate:
    desc: Aplicar migraciones pendientes de la base de datos
    deps:
      - db:up
    cmds:
      - docker run --rm -v {{.TASKFILE_DIR}}/{{.SQITCH_DIR}}:/sqitch -w /sqitch {{.SQITCH_IMAGE}} deploy {{.DB_URL}}

  db:migrate:status:
    desc: Estado actual de las migraciones de Sqitch
    cmds:
      - docker run --rm -v {{.TASKFILE_DIR}}/{{.SQITCH_DIR}}:/sqitch -w /sqitch {{.SQITCH_IMAGE}} status {{.DB_URL}}

  db:migrate:add:
    desc: Crear una nueva migración (requiere NAME=migracion)
    cmds:
      - |
        if [ -z "{{.NAME}}" ]; then
          echo "Uso: task db:migrate:add NAME=nombre_de_la_migracion"
          exit 1
        fi
        docker run --rm -v {{.TASKFILE_DIR}}/{{.SQITCH_DIR}}:/sqitch -w /sqitch {{.SQITCH_IMAGE}} add {{.NAME}}

  db:migrate:revert:
    desc: Revertir la última migración aplicada
    prompt: Esto revertirá la última migración aplicada. ¿Continuar?
    cmds:
      - docker run --rm -v {{.TASKFILE_DIR}}/{{.SQITCH_DIR}}:/sqitch -w /sqitch {{.SQITCH_IMAGE}} revert {{.DB_URL}}

  db:migrate:verify:
    desc: Verificar que las migraciones aplicadas son correctas
    cmds:
      - docker run --rm -v {{.TASKFILE_DIR}}/{{.SQITCH_DIR}}:/sqitch -w /sqitch {{.SQITCH_IMAGE}} verify {{.DB_URL}}

  cluster:up:
    desc: Configurar cluster + Traefik + aplicar infra
    cmds:
      - task: db:up
      - task: db:migrate
      - task: _cluster:check
      - task: _traefik:up
      - task: _metrics:up
      - task: infra:apply

  cluster:down:
    desc: Eliminar recursos de MediCore del cluster
    cmds:
      - task: infra:destroy

  cluster:destroy:
    desc: Destruir TODO (recursos + DB + datos)
    prompt: Esto elimina recursos Kubernetes locales, Traefik y datos de PostgreSQL. Continuar?
    cmds:
      - task: infra:destroy
      - task: _metrics:down
      - task: _traefik:down
      - docker compose -f {{.DB_COMPOSE}} down -v

  cluster:status:
    desc: Estado de nodos y pods
    cmds:
      - kubectl get nodes
      - kubectl get pods,deploy,hpa,svc,ingress -n medicore-env-dev

  build:api:
    desc: Build imagen de la API
    cmds:
      - docker build -t {{.API_IMAGE}} -t {{.API_IMAGE}}:local apps/api

  build:frontend:
    desc: Build imagen del frontend
    cmds:
      - docker build -t {{.FRONTEND_IMAGE}} -t {{.FRONTEND_IMAGE}}:local apps/frontend

  infra:apply:
    desc: Aplicar manifiestos Kubernetes
    cmds:
      - skaffold run

  infra:destroy:
    desc: Eliminar recursos de MediCore del cluster
    cmds:
      - skaffold delete

  k9s:
    desc: Abrir k9s en medicore-env-dev
    cmds:
      - k9s -n medicore-env-dev

  k9s:all:
    desc: Abrir k9s en todos los namespaces
    cmds:
      - k9s --all-namespaces

  logs:api:
    desc: Logs del API Gateway
    cmds:
      - kubectl logs -n medicore-env-dev deployment/local-api-gateway-dev -f --tail=100

  logs:frontend:
    desc: Logs del Frontend
    cmds:
      - kubectl logs -n medicore-env-dev deployment/local-frontend-app-dev -f --tail=100

  test:api:
    desc: Tests unitarios del API (local con uv)
    deps:
      - db:up
    dir: apps/api
    env:
      TEST_DATABASE_URL: postgresql://medicore:secret@localhost:5432/medicore
    cmds:
      - uv run python -m pytest

  test:frontend:
    desc: Lint del frontend
    dir: apps/frontend
    cmds:
      - npm run lint

  _cluster:check:
    internal: true
    cmds:
      - kubectl config current-context
      - kubectl get nodes

  _traefik:up:
    internal: true
    cmds:
      - helm repo add traefik https://traefik.github.io/charts
      - helm repo update
      - helm upgrade --install {{.TRAEFIK_RELEASE}} traefik/traefik --namespace {{.TRAEFIK_NAMESPACE}} --create-namespace --set service.type=LoadBalancer --set ports.web.exposedPort=80 --set ports.websecure.exposedPort=443 --wait --timeout 5m

  _traefik:down:
    internal: true
    cmds:
      - helm uninstall {{.TRAEFIK_RELEASE}} --namespace {{.TRAEFIK_NAMESPACE}} --ignore-not-found

  _metrics:up:
    internal: true
    cmds:
      - helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
      - helm repo update
      - helm upgrade --install {{.METRICS_RELEASE}} metrics-server/metrics-server --namespace {{.METRICS_NAMESPACE}} --set 'args={--kubelet-insecure-tls}' --wait --timeout 5m

  _metrics:down:
    internal: true
    cmds:
      - helm uninstall {{.METRICS_RELEASE}} --namespace {{.METRICS_NAMESPACE}} --ignore-not-found

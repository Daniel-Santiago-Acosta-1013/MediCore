version: '3'

vars:
  CLUSTER_NAME: medicore-dev
  K8S_DIR: infrastructure/k8s
  API_DIR: apps/api
  FRONTEND_DIR: apps/frontend

tasks:
  default:
    desc: Muestra las tareas disponibles
    silent: true
    cmds:
      - task --list

  # ------------------------------------------------------------------
  # Base de datos (Docker nativo, fuera del cluster)
  # ------------------------------------------------------------------

  db:up:
    desc: Levanta PostgreSQL en Docker nativo (persistente)
    cmds:
      - docker compose -f docker-compose.db.yml up -d
      - |
        echo "⏳ Esperando PostgreSQL..."
        for i in {1..30}; do
          if docker compose -f docker-compose.db.yml exec -T db pg_isready -U medicore -d medicore > /dev/null 2>&1; then
            echo "✅ PostgreSQL listo en localhost:5432"
            exit 0
          fi
          sleep 1
        done
        echo "❌ PostgreSQL no respondió a tiempo"
        exit 1

  db:down:
    desc: Detiene PostgreSQL (conserva datos en volumen)
    cmds:
      - docker compose -f docker-compose.db.yml down

  db:destroy:
    desc: Destruye PostgreSQL y borra todos los datos
    cmds:
      - docker compose -f docker-compose.db.yml down -v

  db:logs:
    desc: Logs de PostgreSQL
    cmds:
      - docker compose -f docker-compose.db.yml logs -f

  db:shell:
    desc: Abre psql en el contenedor de PostgreSQL
    cmds:
      - docker compose -f docker-compose.db.yml exec db psql -U medicore -d medicore

  # ------------------------------------------------------------------
  # Cluster (k3d) + Infraestructura
  # ------------------------------------------------------------------

  cluster:up:
    desc: Levanta DB + cluster k3d + aplica infraestructura
    cmds:
      - task db:up
      - |
        if k3d cluster list | grep -q "{{.CLUSTER_NAME}}"; then
          echo "⚠️  Cluster '{{.CLUSTER_NAME}}' ya existe."
        else
          echo "🚀 Creando cluster k3d..."
          k3d cluster create {{.CLUSTER_NAME}} --servers 1 --agents 2 \
            --port "80:80@loadbalancer" \
            --port "443:443@loadbalancer"
        fi
      - task infra:apply
      - 'echo "✅ MediCore listo. API: http://localhost/api  Frontend: http://localhost"'

  cluster:down:
    desc: Destruye SOLO el cluster k3d (la DB sigue viva)
    cmds:
      - echo "💥 Destruyendo cluster k3d..."
      - k3d cluster delete {{.CLUSTER_NAME}}
      - 'echo "💡 La DB sigue corriendo. Para detenerla: task db:down"'

  cluster:destroy:
    desc: Destruye TODO (cluster k3d + PostgreSQL + datos)
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}} 2>/dev/null || true
      - docker compose -f docker-compose.db.yml down -v 2>/dev/null || true
      - echo "🧹 Todo destruido."

  cluster:status:
    desc: Estado del cluster y pods de MediCore
    cmds:
      - echo "=== NODES ===" && kubectl get nodes
      - echo "=== NAMESPACES ===" && kubectl get ns -l app.kubernetes.io/part-of=medicore
      - echo "=== PODS ===" && kubectl get pods -n medicore-api && kubectl get pods -n medicore-frontend

  # ------------------------------------------------------------------
  # Infraestructura Kubernetes (Kustomize)
  # ------------------------------------------------------------------

  infra:apply:
    desc: Aplica manifiestos Kubernetes del overlay local
    cmds:
      - kubectl apply -k {{.K8S_DIR}}/overlays/local/
      - echo "⏳ Esperando pods..."
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/part-of=medicore --all-namespaces --timeout=120s
      - echo "✅ Infraestructura aplicada."

  infra:destroy:
    desc: Elimina todos los recursos de MediCore del cluster
    cmds:
      - kubectl delete -k {{.K8S_DIR}}/overlays/local/ --ignore-not-found=true

  # ------------------------------------------------------------------
  # Build e importación de imágenes locales
  # ------------------------------------------------------------------

  build:api:
    desc: Construye imagen Docker de la API y la carga al cluster k3d
    dir: "{{.API_DIR}}"
    cmds:
      - docker build -t medicore-api:local .
      - k3d image import medicore-api:local -c {{.CLUSTER_NAME}}
      - echo "✅ Imagen medicore-api:local cargada en el cluster"

  build:frontend:
    desc: Construye imagen Docker del Frontend y la carga al cluster k3d
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - docker build -t medicore-frontend:local .
      - k3d image import medicore-frontend:local -c {{.CLUSTER_NAME}}
      - echo "✅ Imagen medicore-frontend:local cargada en el cluster"

  # ------------------------------------------------------------------
  # Tests
  # ------------------------------------------------------------------

  test:api:
    desc: Tests unitarios del API localmente con uv
    dir: "{{.API_DIR}}"
    cmds:
      - uv run pytest app/tests -v

  test:frontend:
    desc: Lint del frontend
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run lint

  # ------------------------------------------------------------------
  # Observabilidad
  # ------------------------------------------------------------------

  k9s:
    desc: Abre k9s en el namespace medicore-api
    cmds:
      - k9s -n medicore-api

  k9s:all:
    desc: Abre k9s viendo todos los namespaces
    cmds:
      - k9s --all-namespaces

  # ------------------------------------------------------------------
  # Debug
  # ------------------------------------------------------------------

  port-forward:api:
    desc: Port-forward del API Gateway a localhost:8080
    cmds:
      - kubectl port-forward -n medicore-api svc/local-api-gateway-dev 8080:80

  logs:api:
    desc: Logs en vivo del API Gateway
    cmds:
      - kubectl logs -n medicore-api deployment/local-api-gateway-dev -f

  logs:frontend:
    desc: Logs en vivo del Frontend
    cmds:
      - kubectl logs -n medicore-frontend deployment/local-frontend-app-dev -f

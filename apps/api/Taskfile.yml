version: '3'

# Carga automática de variables de entorno desde .env
dotenv: ['.env']

vars:
  COMPOSE: docker compose
  UV: uv
  PYTEST_ARGS: app/tests -v

tasks:
  default:
    desc: Muestra la ayuda de tareas disponibles
    silent: true
    cmds:
      - task --list

  # ------------------------------------------------------------------
  # Infraestructura (Docker Compose + PostgreSQL + Sqitch)
  # ------------------------------------------------------------------

  up:
    desc: Levanta API + DB (sin rebuild forzado); migraciones automáticas vía entrypoint
    cmds:
      - '{{.COMPOSE}} up -d'
      - task db:wait
      - task api:wait
      - echo "✅ MediCore API lista en http://localhost:8000"

  up:build:
    desc: Build + levanta API + DB; aplicación automática de migraciones
    cmds:
      - '{{.COMPOSE}} up --build -d'
      - task db:wait
      - task api:wait
      - echo "✅ MediCore API lista en http://localhost:8000"

  down:
    desc: Detiene y elimina todos los servicios
    cmds:
      - '{{.COMPOSE}} down'

  logs:
    desc: Muestra logs en tiempo real de todos los servicios
    cmds:
      - '{{.COMPOSE}} logs -f'

  api:logs:
    desc: Muestra logs de la API
    cmds:
      - '{{.COMPOSE}} logs -f api'

  db:logs:
    desc: Muestra logs de PostgreSQL
    cmds:
      - '{{.COMPOSE}} logs -f db'

  restart:
    desc: Reinicia la API
    cmds:
      - '{{.COMPOSE}} restart api'
      - task api:wait

  db:up:
    desc: Levanta solo la base de datos
    cmds:
      - '{{.COMPOSE}} up -d db'
      - task db:wait

  db:wait:
    desc: Espera a que el contenedor db esté healthy y PostgreSQL responda
    silent: true
    cmds:
      - |
        echo "⏳ Esperando a que PostgreSQL esté listo..."
        for i in {1..40}; do
          if {{.COMPOSE}} exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" > /dev/null 2>&1; then
            echo "✅ PostgreSQL está listo."
            exit 0
          fi
          echo "   ... intento $i/40"
          sleep 1
        done
        echo "❌ PostgreSQL no respondió a tiempo."
        exit 1

  api:wait:
    desc: Espera a que la API responda en /health
    silent: true
    cmds:
      - |
        echo "⏳ Esperando a que la API esté lista..."
        for i in {1..30}; do
          if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
            echo "✅ API responde correctamente."
            exit 0
          fi
          echo "   ... intento $i/30"
          sleep 1
        done
        echo "❌ La API no respondió a tiempo. Revisa los logs con: task api:logs"
        exit 1

  db:migrate:
    desc: Aplica migraciones de Sqitch (deploy) manualmente
    cmds:
      - |
        {{.COMPOSE}} exec api bash -c \
          "cd /app/db && sqitch deploy db:pg://\$POSTGRES_USER:\$POSTGRES_PASSWORD@\$POSTGRES_HOST:\$POSTGRES_PORT/\$POSTGRES_DB"

  db:revert:
    desc: Revierte migraciones de Sqitch
    cmds:
      - |
        {{.COMPOSE}} exec api bash -c \
          "cd /app/db && sqitch revert db:pg://\$POSTGRES_USER:\$POSTGRES_PASSWORD@\$POSTGRES_HOST:\$POSTGRES_PORT/\$POSTGRES_DB"

  db:verify:
    desc: Verifica estado de migraciones de Sqitch
    cmds:
      - |
        {{.COMPOSE}} exec api bash -c \
          "cd /app/db && sqitch verify db:pg://\$POSTGRES_USER:\$POSTGRES_PASSWORD@\$POSTGRES_HOST:\$POSTGRES_PORT/\$POSTGRES_DB"

  db:status:
    desc: Muestra el estado actual de migraciones
    cmds:
      - |
        {{.COMPOSE}} exec api bash -c \
          "cd /app/db && sqitch status db:pg://\$POSTGRES_USER:\$POSTGRES_PASSWORD@\$POSTGRES_HOST:\$POSTGRES_PORT/\$POSTGRES_DB"

  db:reset:
    desc: "Revierte TODO y vuelve a aplicar migraciones (cuidado: datos)"
    cmds:
      - task db:revert
      - task db:migrate

  db:shell:
    desc: Abre psql dentro del contenedor PostgreSQL
    cmds:
      - '{{.COMPOSE}} exec db psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}"'

  # ------------------------------------------------------------------
  # Tests
  # ------------------------------------------------------------------

  test:
    desc: Corre tests dentro del contenedor Docker
    cmds:
      - '{{.COMPOSE}} exec api pytest {{.PYTEST_ARGS}}'

  test:local:
    desc: Corre tests localmente con uv
    cmds:
      - '{{.UV}} run pytest {{.PYTEST_ARGS}}'

  test:cov:
    desc: Corre tests con cobertura localmente
    cmds:
      - '{{.UV}} run pytest {{.PYTEST_ARGS}} --cov=app --cov-report=term-missing'

  test:api:
    desc: "Tests end-to-end automaticos con Schemathesis (requiere API corriendo)"
    cmds:
      - |
        echo "🔍 Schemathesis: probando todos los endpoints via OpenAPI..."
        {{.UV}} run st run http://localhost:8000/openapi.json \
          --checks not_a_server_error,response_schema_conformance \
          --max-response-time 5 \
          --max-failures 10 \
          --seed 42

  # ------------------------------------------------------------------
  # Pipeline local de dependencias (uv)
  # ------------------------------------------------------------------

  deps:lock:
    desc: Genera/actualiza uv.lock con versiones exactas
    cmds:
      - '{{.UV}} lock'

  deps:sync:
    desc: Sincroniza el entorno virtual con uv.lock
    cmds:
      - '{{.UV}} sync'

  deps:upgrade:
    desc: Actualiza todas las dependencias a sus últimas versiones compatibles
    cmds:
      - '{{.UV}} lock --upgrade'

  deps:outdated:
    desc: Muestra dependencias con versiones más recientes disponibles
    cmds:
      - '{{.UV}} pip list --outdated || true'

  deps:audit:
    desc: Audita vulnerabilidades en dependencias con pip-audit
    cmds:
      - '{{.UV}} run pip-audit --desc || true'

  deps:export:
    desc: Exporta dependencias a requirements.txt (util para auditorías externas)
    cmds:
      - '{{.UV}} export --no-dev -o requirements.txt'

  deps:pipeline:
    desc: Pipeline completo de dependencias (lock → sync → audit → outdated)
    summary: |
      Ejecuta el pipeline completo de gestión de dependencias:
      1. Actualiza uv.lock
      2. Sincroniza el entorno virtual
      3. Audita vulnerabilidades
      4. Muestra paquetes desactualizados
    cmds:
      - echo "🔒 1/4 Generando uv.lock..."
      - task deps:lock
      - echo "📦 2/4 Sincronizando entorno virtual..."
      - task deps:sync
      - echo "🔍 3/4 Auditando vulnerabilidades..."
      - task deps:audit
      - echo "📋 4/4 Chequeando paquetes desactualizados..."
      - task deps:outdated
      - echo "✅ Pipeline de dependencias completado"

  deps:clean:
    desc: Elimina entorno virtual y cachés de uv
    cmds:
      - rm -rf .venv
      - '{{.UV}} cache clean'

  # ------------------------------------------------------------------
  # Calidad de código (opcional, si se instalan herramientas)
  # ------------------------------------------------------------------

  lint:
    desc: Ejecuta linting con ruff si está disponible
    cmds:
      - '{{.UV}} run ruff check app || echo "⚠️  ruff no instalado. Agregalo como dev dependency si lo necesitas."'

  format:
    desc: Formatea código con ruff si está disponible
    cmds:
      - '{{.UV}} run ruff format app || echo "⚠️  ruff no instalado. Agregalo como dev dependency si lo necesitas."'

  # ------------------------------------------------------------------
  # Utilidades
  # ------------------------------------------------------------------

  clean:
    desc: Limpia contenedores, volúmenes y entornos
    cmds:
      - '{{.COMPOSE}} down -v --remove-orphans'
      - task deps:clean
      - echo "🧹 Limpieza completa"

  api:shell:
    desc: Abre un shell bash dentro del contenedor de la API
    cmds:
      - '{{.COMPOSE}} exec api bash'

  api:health:
    desc: Verifica el healthcheck de la API
    cmds:
      - curl -s http://localhost:8000/health | python -m json.tool || echo "❌ API no responde"

apiVersion: v1
kind: ConfigMap
metadata:
  name: medicore-backend-dashboard
  namespace: medicore-monitoring-env-dev
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "MediCore"
data:
  medicore-backend-dashboard.json: |-
    {
      "uid": "medicore-backend",
      "title": "MediCore - Backend API",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "15s",
      "timezone": "browser",
      "tags": ["medicore", "backend", "errors"],
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [{
          "name": "namespace",
          "type": "query",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "query": "label_values(kube_namespace_status_phase, namespace)",
          "current": { "selected": true, "text": "medicore-env-dev", "value": "medicore-env-dev" },
          "refresh": 1
        }]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "API Errors 15m",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_api_errors_total{endpoint!=\"metrics\"}[15m])) or vector(0)", "legendFormat": "errors" }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Unhandled Exceptions 15m",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_api_exceptions_total[15m])) or vector(0)", "legendFormat": "exceptions" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Auth Failures 15m",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_auth_failures_total[15m])) or vector(0)", "legendFormat": "auth failures" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "DB Errors 15m",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_db_errors_total[15m])) or vector(0)", "legendFormat": "db errors" }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "API Errors by Module and Type",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum by (module, error_type) (rate(medicore_api_errors_total{endpoint!=\"metrics\"}[5m])) or on() vector(0)", "legendFormat": "{{module}} / {{error_type}}" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "API Errors by Status",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum by (status_code) (rate(medicore_api_errors_total{endpoint!=\"metrics\"}[5m])) or on() vector(0)", "legendFormat": "{{status_code}}" }]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Permission Denied by Role",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{ "expr": "sum by (role) (rate(medicore_permission_denied_total[5m])) or on() vector(0)", "legendFormat": "{{role}}" }]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "DB Error Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{ "expr": "sum by (module, operation, error_type) (rate(medicore_db_errors_total[5m])) or on() vector(0)", "legendFormat": "{{module}}/{{operation}} {{error_type}}" }]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "DB p95 Duration",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [{ "expr": "(histogram_quantile(0.95, sum by (le, module, operation) (rate(medicore_db_operation_duration_seconds_bucket[5m]))) and on(module, operation) (sum by (module, operation) (rate(medicore_db_operation_duration_seconds_count[5m])) > 0)) or on() vector(0)", "legendFormat": "{{module}}/{{operation}}" }],
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Database Up",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [{ "expr": "max(medicore_external_dependency_up{dependency=\"database\"}) or vector(0)", "legendFormat": "database" }]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medicore-frontend-dashboard
  namespace: medicore-monitoring-env-dev
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "MediCore"
data:
  medicore-frontend-dashboard.json: |-
    {
      "uid": "medicore-frontend",
      "title": "MediCore - Frontend",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "15s",
      "timezone": "browser",
      "tags": ["medicore", "frontend", "errors"],
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Frontend Errors 15m",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_frontend_errors_total[15m])) or vector(0)", "legendFormat": "ui errors" }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "API Errors Seen by Frontend 15m",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_frontend_api_errors_total[15m])) or vector(0)", "legendFormat": "api errors" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error/Warning Toasts 15m",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(increase(medicore_frontend_toasts_total{type=~\"error|warning\"}[15m])) or vector(0)", "legendFormat": "toasts" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Frontend Ready Pods",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(kube_deployment_status_replicas_available{deployment=~\".*frontend.*\"}) or vector(0)", "legendFormat": "ready" }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Frontend Errors by Route and Source",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum by (route, source, error_type) (rate(medicore_frontend_errors_total[5m])) or on() vector(0)", "legendFormat": "{{route}} / {{source}} / {{error_type}}" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Frontend API Errors by Status",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum by (route, method, status_code) (rate(medicore_frontend_api_errors_total[5m])) or on() vector(0)", "legendFormat": "{{method}} {{route}} {{status_code}}" }]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Frontend API p95 Duration",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{ "expr": "(histogram_quantile(0.95, sum by (le, route, method) (rate(medicore_frontend_api_request_duration_seconds_bucket[5m]))) and on(route, method) (sum by (route, method) (rate(medicore_frontend_api_request_duration_seconds_count[5m])) > 0)) or on() vector(0)", "legendFormat": "{{method}} {{route}}" }],
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Toast Volume by Type",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{ "expr": "sum by (type) (rate(medicore_frontend_toasts_total[5m])) or on() vector(0)", "legendFormat": "{{type}}" }]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medicore-cluster-dashboard
  namespace: medicore-monitoring-env-dev
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "MediCore"
data:
  medicore-cluster-dashboard.json: |-
    {
      "uid": "medicore-cluster",
      "title": "MediCore - Kubernetes Cluster",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "15s",
      "timezone": "browser",
      "tags": ["medicore", "kubernetes", "errors"],
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [{
          "name": "namespace",
          "type": "query",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "query": "label_values(kube_namespace_status_phase, namespace)",
          "current": { "selected": true, "text": "medicore-env-dev", "value": "medicore-env-dev" },
          "refresh": 1
        }]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Pods Not Running",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{namespace=\"$namespace\", phase!=\"Running\", phase!=\"Succeeded\"}) or vector(0)", "legendFormat": "not running" }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Restarts 15m",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[15m])) or vector(0)", "legendFormat": "restarts" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Unavailable Replicas",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(kube_deployment_status_replicas_unavailable{namespace=\"$namespace\"}) or vector(0)", "legendFormat": "unavailable" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Waiting Containers",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_container_status_waiting_reason{namespace=\"$namespace\"}) or vector(0)", "legendFormat": "waiting" }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "CrashLoopBackOff / ImagePullBackOff",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum by (pod, reason) (kube_pod_container_status_waiting_reason{namespace=\"$namespace\", reason=~\"CrashLoopBackOff|ImagePullBackOff|ErrImagePull\"}) or on() vector(0)", "legendFormat": "{{pod}} / {{reason}}" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Restarts by Pod",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[15m])) or on() vector(0)", "legendFormat": "{{pod}}" }]
        },
        {
          "id": 7,
          "type": "table",
          "title": "Deployments With Unavailable Replicas",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [{ "expr": "kube_deployment_status_replicas_unavailable{namespace=\"$namespace\"} > 0", "format": "table", "instant": true }]
        }
      ]
    }

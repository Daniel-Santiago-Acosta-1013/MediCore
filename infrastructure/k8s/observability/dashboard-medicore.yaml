apiVersion: v1
kind: ConfigMap
metadata:
  name: medicore-focused-dashboard
  namespace: medicore-monitoring-env-dev
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "MediCore"
data:
  medicore-focused-dashboard.json: |-
    {
      "uid": "medicore-focused",
      "title": "MediCore - API, Frontend and Kubernetes",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "timezone": "browser",
      "tags": ["medicore", "api", "frontend", "kubernetes"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(kube_namespace_status_phase, namespace)",
            "current": {
              "selected": true,
              "text": "medicore-env-dev",
              "value": "medicore-env-dev"
            },
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "API Ready Pods",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"$namespace\", deployment=~\".*api-gateway.*\"}",
              "legendFormat": "ready"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Frontend Ready Pods",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"$namespace\", deployment=~\".*frontend.*\"}",
              "legendFormat": "ready"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Pods Running",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{namespace=\"$namespace\", phase=\"Running\"})",
              "legendFormat": "running"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pod Restarts",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[15m]))",
              "legendFormat": "restarts"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "API Requests by Status",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_requests_total{namespace=\"$namespace\", pod=~\".*api-gateway.*\"}[5m]))",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "API p95 Latency",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\", pod=~\".*api-gateway.*\"}[5m])))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "API CPU",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", pod=~\".*api-gateway.*\", container!=\"\", image!=\"\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Frontend CPU",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", pod=~\".*frontend.*\", container!=\"\", image!=\"\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "API Memory",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", pod=~\".*api-gateway.*\", container!=\"\", image!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Frontend Memory",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", pod=~\".*frontend.*\", container!=\"\", image!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "table",
          "title": "Kubernetes Workloads",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"$namespace\", deployment=~\".*api-gateway.*|.*frontend.*|.*patient-service.*\"}",
              "legendFormat": "{{deployment}} available",
              "format": "table",
              "instant": true
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"$namespace\", deployment=~\".*api-gateway.*|.*frontend.*|.*patient-service.*\"}",
              "legendFormat": "{{deployment}} desired",
              "format": "table",
              "instant": true
            }
          ]
        }
      ]
    }

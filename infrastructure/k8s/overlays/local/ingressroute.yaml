apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-gateway
  namespace: medicore-env-dev
spec:
  entryPoints:
    - web
  routes:
  - match: PathPrefix(`/api`)
    kind: Rule
    services:
    - name: api-gateway
      port: 80
    middlewares:
    - name: strip-api-prefix
      namespace: medicore-env-dev

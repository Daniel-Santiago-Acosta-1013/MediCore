apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configurations:
- kustomizeconfig.yaml

resources:
- ../../base/namespaces
- ../../base/api-gateway
- ../../base/patient-service
- ../../base/frontend-app
- ingress.yaml
- middleware.yaml
- ingressroute.yaml

namePrefix: local-
nameSuffix: -dev

labels:
- includeSelectors: true
  pairs:
    environment: local
    cluster: medicore-dev

commonAnnotations:
  medicore.io/managed-by: kustomize
  medicore.io/environment: local

patches:
- path: patches/api-gateway-resources.yaml
- path: patches/patient-service-resources.yaml
- path: patches/frontend-app-resources.yaml

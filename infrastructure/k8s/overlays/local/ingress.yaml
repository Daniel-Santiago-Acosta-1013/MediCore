apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medicore-ingress
  namespace: medicore-frontend
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-app
            port:
              number: 80

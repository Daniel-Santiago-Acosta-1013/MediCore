apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medicore-api
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: api-gateway
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"

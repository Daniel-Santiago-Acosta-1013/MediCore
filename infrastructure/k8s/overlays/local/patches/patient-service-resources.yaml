apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: medicore-env-dev
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: patient-service
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"

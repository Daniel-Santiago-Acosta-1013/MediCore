apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: medicore-env-dev
  labels:
    app.kubernetes.io/name: patient-service
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: medicore
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: patient-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: patient-service
        app.kubernetes.io/component: microservice
        app.kubernetes.io/part-of: medicore
    spec:
      containers:
      - name: patient-service
        image: nginx:alpine
        ports:
        - name: http
          containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5

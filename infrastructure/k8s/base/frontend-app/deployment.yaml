apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: medicore-env-dev
  labels:
    app.kubernetes.io/name: frontend-app
    app.kubernetes.io/component: web-ui
    app.kubernetes.io/part-of: medicore
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-app
        app.kubernetes.io/component: web-ui
        app.kubernetes.io/part-of: medicore
    spec:
      containers:
      - name: frontend-app
        image: medicore-frontend
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
